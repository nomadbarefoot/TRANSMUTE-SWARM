# Parallel Cog runner. Trigger via workflow_dispatch.
# Creates cogs/<run_tag>/<cog_id> branches via cog_manager and runs one agent per Cog.
name: Swarm Research

on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "Run tag (e.g. poc_001)"
        required: true
        default: poc_001
      cog_ids:
        description: "Cog IDs (comma-separated, e.g. sort,search,filter)"
        required: true
        default: "sort,search,filter"
      iterations:
        description: "Max experiment iterations per Cog"
        required: false
        default: 4
        type: number

jobs:
  prepare_matrix:
    runs-on: ubuntu-latest
    outputs:
      cog_ids: ${{ steps.matrix.outputs.cog_ids }}
    steps:
      - id: matrix
        run: |
          RAW="${{ inputs.cog_ids }}"
          JSON="[\"$(echo "$RAW" | sed 's/,/","/g')\"]"
          echo "cog_ids=$JSON" >> $GITHUB_OUTPUT

  setup_cog_branches:
    needs: prepare_matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r config/requirements.txt
      - name: Configure git
        run: |
          git config user.email "swarm-agent@transmute.local"
          git config user.name "Swarm Agent"
      - name: Create and push Cog branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 agents/cog_manager.py create \
            --run_tag "${{ inputs.run_tag }}" \
            --cog_ids "${{ inputs.cog_ids }}" \
            --push

  cog_research:
    needs: [prepare_matrix, setup_cog_branches]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        cog_id: ${{ fromJson(needs.prepare_matrix.outputs.cog_ids) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cogs/${{ inputs.run_tag }}/${{ matrix.cog_id }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r config/requirements.txt
      - name: Configure git for Cog commits
        run: |
          git config user.email "cog-${{ matrix.cog_id }}@transmute.local"
          git config user.name "Cog ${{ matrix.cog_id }}"
      - name: Run Cog agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 agents/agent.py \
            --branch_id ${{ matrix.cog_id }} \
            --iterations ${{ inputs.iterations }} \
            --run_tag ${{ inputs.run_tag }}
      - name: Push Cog results
        run: git push origin "cogs/${{ inputs.run_tag }}/${{ matrix.cog_id }}"
        continue-on-error: true
      - name: Upload results TSV
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.cog_id }}
          path: results/results_${{ matrix.cog_id }}.tsv
          if-no-files-found: ignore
