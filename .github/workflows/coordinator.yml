# Coordinator run: get results TSVs from swarm artifacts, run coordinator script, upload report.
# Trigger after swarm.yml (provide swarm_run_id when manual) or via workflow_run when swarm completes.
name: Coordinator

on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "Run tag (same as swarm run)"
        required: true
        default: poc_001
      branch_ids:
        description: "Branch IDs (comma-separated)"
        required: true
        default: "sort,search,filter"
      swarm_run_id:
        description: "Swarm workflow run ID (to download results TSVs from artifacts). Required for manual run."
        required: false
  workflow_run:
    workflows: ["Swarm Research"]
    types: [completed]
    branches: [main]

jobs:
  coordinator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read   # required to download artifacts from another run (swarm_run_id)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch swarm branches
        run: git fetch origin
      - name: Set run tag and branch IDs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            RUN_TAG=$(gh run view "$RUN_ID" --json inputs -q '.inputs.run_tag // "poc_001"' 2>/dev/null || echo "poc_001")
            BRANCH_IDS=$(gh run view "$RUN_ID" --json inputs -q '.inputs.branch_ids // "sort,search,filter"' 2>/dev/null || echo "sort,search,filter")
            echo "run_tag=$RUN_TAG" >> $GITHUB_OUTPUT
            echo "branch_ids=$BRANCH_IDS" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ inputs.swarm_run_id }}" >> $GITHUB_OUTPUT
            echo "run_tag=${{ inputs.run_tag }}" >> $GITHUB_OUTPUT
            echo "branch_ids=${{ inputs.branch_ids }}" >> $GITHUB_OUTPUT
          fi
      - name: Download results TSVs from swarm artifacts
        if: steps.vars.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.vars.outputs.run_id }}"
          mkdir -p results
          for bid in $(echo "${{ steps.vars.outputs.branch_ids }}" | tr ',' ' '); do
            bid=$(echo "$bid" | xargs)
            [ -z "$bid" ] && continue
            gh run download "$RUN_ID" -n "results-${bid}" -D "results-${bid}" || true
            if [ -f "results-${bid}/results_${bid}.tsv" ]; then
              cp "results-${bid}/results_${bid}.tsv" results/
            fi
          done
          echo "TSV files in results/:"
          ls -la results/results_*.tsv 2>/dev/null || true
          if [ ! -f results/results_sort.tsv ] && [ ! -f results/results_search.tsv ] && [ ! -f results/results_filter.tsv ]; then
            echo "ERROR: No results_*.tsv found in results/ after download."
            exit 1
          fi
      - name: Collect results TSVs from branches (fallback when no swarm_run_id)
        if: steps.vars.outputs.run_id == ''
        run: |
          mkdir -p results
          RUN_TAG="${{ steps.vars.outputs.run_tag }}"
          for bid in $(echo "${{ steps.vars.outputs.branch_ids }}" | tr ',' ' '); do
            bid=$(echo "$bid" | xargs)
            [ -z "$bid" ] && continue
            git show "origin/swarm/${RUN_TAG}/${bid}:results/results_${bid}.tsv" > "results/results_${bid}.tsv" 2>/dev/null || git show "origin/swarm/${RUN_TAG}/${bid}:results_${bid}.tsv" > "results/results_${bid}.tsv" 2>/dev/null || echo "No results_${bid}.tsv on branch"
          done
          ls -la results/results_*.tsv 2>/dev/null || true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run coordinator script
        run: |
          pip install pyyaml -q
          python3 agents/coordinator_script.py --run_tag "${{ steps.vars.outputs.run_tag }}" --branch_ids $(echo "${{ steps.vars.outputs.branch_ids }}" | tr ',' ' ')
      - name: Upload coordinator report
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-report
          path: coordinator_report_*.md
          if-no-files-found: ignore
