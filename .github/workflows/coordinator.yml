# Coordinator run: collect Cog results, synthesize, upload report.
# Trigger manually (provide swarm_run_id) or automatically after Swarm Research completes.
name: Coordinator

on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "Run tag (same as swarm run)"
        required: true
        default: poc_001
      cog_ids:
        description: "Cog IDs (comma-separated)"
        required: true
        default: "sort,search,filter"
      swarm_run_id:
        description: "Swarm workflow run ID (to download results TSVs from artifacts). Required for manual run."
        required: false
  workflow_run:
    workflows: ["Swarm Research"]
    types: [completed]
    branches: [main]

jobs:
  coordinator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch Cog branches
        run: git fetch origin
      - name: Set run tag and Cog IDs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            RUN_TAG=$(gh run view "$RUN_ID" --json inputs -q '.inputs.run_tag // "poc_001"' 2>/dev/null || echo "poc_001")
            COG_IDS=$(gh run view "$RUN_ID" --json inputs -q '.inputs.cog_ids // "sort,search,filter"' 2>/dev/null || echo "sort,search,filter")
            echo "run_tag=$RUN_TAG" >> $GITHUB_OUTPUT
            echo "cog_ids=$COG_IDS" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ inputs.swarm_run_id }}" >> $GITHUB_OUTPUT
            echo "run_tag=${{ inputs.run_tag }}" >> $GITHUB_OUTPUT
            echo "cog_ids=${{ inputs.cog_ids }}" >> $GITHUB_OUTPUT
          fi
      - name: Download results TSVs from swarm artifacts
        if: steps.vars.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.vars.outputs.run_id }}"
          mkdir -p results
          for cid in $(echo "${{ steps.vars.outputs.cog_ids }}" | tr ',' ' '); do
            cid=$(echo "$cid" | xargs)
            [ -z "$cid" ] && continue
            gh run download "$RUN_ID" -n "results-${cid}" -D "results-${cid}" || true
            if [ -f "results-${cid}/results_${cid}.tsv" ]; then
              cp "results-${cid}/results_${cid}.tsv" results/
            fi
          done
          echo "TSV files in results/:"
          ls -la results/results_*.tsv 2>/dev/null || true
          if ! ls results/results_*.tsv 1>/dev/null 2>&1; then
            echo "ERROR: No results_*.tsv found in results/ after download." >&2
            exit 1
          fi
      - name: Collect results TSVs from Cog branches (fallback when no swarm_run_id)
        if: steps.vars.outputs.run_id == ''
        run: |
          mkdir -p results
          RUN_TAG="${{ steps.vars.outputs.run_tag }}"
          for cid in $(echo "${{ steps.vars.outputs.cog_ids }}" | tr ',' ' '); do
            cid=$(echo "$cid" | xargs)
            [ -z "$cid" ] && continue
            git show "origin/cogs/${RUN_TAG}/${cid}:results/results_${cid}.tsv" > "results/results_${cid}.tsv" 2>/dev/null \
              || echo "No results_${cid}.tsv on cogs/${RUN_TAG}/${cid}"
          done
          ls -la results/results_*.tsv 2>/dev/null || true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r config/requirements.txt
      - name: Run coordinator
        run: |
          python3 agents/coordinator_script.py \
            --run_tag "${{ steps.vars.outputs.run_tag }}" \
            --branch_ids $(echo "${{ steps.vars.outputs.cog_ids }}" | tr ',' ' ')
      - name: Upload coordinator report
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-report
          path: coordinator_report_*.md
          if-no-files-found: ignore
