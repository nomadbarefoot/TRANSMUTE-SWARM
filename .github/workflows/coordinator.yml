# Coordinator run: get results TSVs from swarm artifacts, run coordinator script, upload report.
# Trigger after swarm.yml (provide swarm_run_id when manual) or via workflow_run when swarm completes.
name: Coordinator

on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "Run tag (same as swarm run)"
        required: true
        default: poc_001
      branch_ids:
        description: "Branch IDs (comma-separated)"
        required: true
        default: "sort,search,filter"
      swarm_run_id:
        description: "Swarm workflow run ID (to download results TSVs from artifacts). Required for manual run."
        required: false
  workflow_run:
    workflows: ["Swarm Research"]
    types: [completed]
    branches: [main]

jobs:
  coordinator:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, use that run's id and inputs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch swarm branches
        run: git fetch origin
      - name: Set run tag and branch IDs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            echo "run_tag=${{ github.event.workflow_run.inputs.run_tag }}" >> $GITHUB_OUTPUT
            echo "branch_ids=${{ github.event.workflow_run.inputs.branch_ids }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ inputs.swarm_run_id }}" >> $GITHUB_OUTPUT
            echo "run_tag=${{ inputs.run_tag }}" >> $GITHUB_OUTPUT
            echo "branch_ids=${{ inputs.branch_ids }}" >> $GITHUB_OUTPUT
          fi
      - name: Download results TSVs from swarm artifacts
        if: steps.vars.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.vars.outputs.run_id }}
        continue-on-error: true
      - name: Copy TSVs to repo root
        if: steps.vars.outputs.run_id != ''
        run: |
          for bid in $(echo "${{ steps.vars.outputs.branch_ids }}" | tr ',' ' '); do
            bid=$(echo "$bid" | xargs)
            [ -z "$bid" ] && continue
            if [ -f "results-${bid}/results_${bid}.tsv" ]; then
              cp "results-${bid}/results_${bid}.tsv" .
            fi
          done
          ls -la results_*.tsv 2>/dev/null || true
      - name: Collect results TSVs from branches (fallback when no swarm_run_id)
        if: steps.vars.outputs.run_id == ''
        run: |
          RUN_TAG="${{ steps.vars.outputs.run_tag }}"
          for bid in $(echo "${{ steps.vars.outputs.branch_ids }}" | tr ',' ' '); do
            bid=$(echo "$bid" | xargs)
            [ -z "$bid" ] && continue
            git show "origin/swarm/${RUN_TAG}/${bid}:results_${bid}.tsv" > "results_${bid}.tsv" 2>/dev/null || echo "No results_${bid}.tsv on branch"
          done
          ls -la results_*.tsv 2>/dev/null || true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run coordinator script
        run: |
          pip install pyyaml -q
          python3 coordinator_script.py --run_tag "${{ steps.vars.outputs.run_tag }}" --branch_ids $(echo "${{ steps.vars.outputs.branch_ids }}" | tr ',' ' ')
      - name: Upload coordinator report
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-report
          path: coordinator_report_*.md
          if-no-files-found: ignore
